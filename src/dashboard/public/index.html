<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memoria Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --persona-color: #22c55e;
            --persona-glow: rgba(34, 197, 94, 0.5);
            --persona-dim: rgba(34, 197, 94, 0.1);
            --persona-dark: rgba(34, 197, 94, 0.05);
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #050505;
            color: #f3f4f6;
            overflow-x: hidden;
            background-image:
                linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
            transition: color 0.5s ease;
        }

        h1,
        h2,
        h3 {
            font-family: 'Outfit', sans-serif;
        }

        .cli-border {
            border: 1px solid var(--persona-dim);
            position: relative;
            transition: border-color 0.5s ease;
        }

        .cli-border::before {
            content: "";
            position: absolute;
            top: -1px;
            left: -1px;
            right: -1px;
            bottom: -1px;
            background: linear-gradient(45deg, transparent 95%, var(--persona-color) 95%);
            pointer-events: none;
            transition: background 0.5s ease;
        }

        .glass {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(4px);
        }

        .glow-persona {
            box-shadow: 0 0 15px var(--persona-dim);
        }

        .text-neon {
            text-shadow: 0 0 5px var(--persona-glow);
            transition: text-shadow 0.5s ease;
        }

        input,
        select,
        textarea {
            background: #0a0a0a !important;
            border-color: #1a1a1a !important;
            color: #ffffff !important;
            transition: border-color 0.5s ease !important;
        }

        input:focus {
            border-color: var(--persona-color) !important;
            box-shadow: 0 0 10px var(--persona-dark);
        }

        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: #050505;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--persona-color);
            border-radius: 0px;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [memories, setMemories] = useState([]);
            const [searchQuery, setSearchQuery] = useState('');
            const [loading, setLoading] = useState(true);
            const [project, setProject] = useState('default');
            const [projects, setProjects] = useState(['default']);
            const [personas, setPersonas] = useState([]);
            const [activePersona, setActivePersona] = useState('architect');

            const PERSONA_STYLES = {
                architect: { color: '#3bdef6', glow: 'rgba(59, 130, 246, 0.5)' },
                slang: { color: '#f724a6', glow: 'rgba(168, 85, 247, 0.5)' },
                grumpy: { color: '#facc15', glow: 'rgba(250, 204, 21, 0.5)' }
            };

            useEffect(() => {
                const style = PERSONA_STYLES[activePersona] || PERSONA_STYLES.architect;
                document.documentElement.style.setProperty('--persona-color', style.color);
                document.documentElement.style.setProperty('--persona-glow', style.glow);
                document.documentElement.style.setProperty('--persona-dim', style.color + '33'); // 20% opacity
                document.documentElement.style.setProperty('--persona-dark', style.color + '11'); // 7% opacity
            }, [activePersona]);

            useEffect(() => {
                fetchProjects();
                fetchPersonas();
                fetchConfig();
            }, []);

            const fetchConfig = async () => {
                try {
                    const res = await fetch(`http://localhost:3000/api/config`);
                    const data = await res.json();
                    if (data.currentProject) {
                        setProject(data.currentProject);
                    }
                } catch (e) {
                    console.error("Failed to fetch config", e);
                }
            };

            useEffect(() => {
                fetchData();
                fetchCurrentPersona();
            }, [project]);

            const fetchData = async () => {
                setLoading(true);
                try {
                    const res = await fetch(`http://localhost:3000/api/memories?project=${project}`);
                    const data = await res.json();
                    setMemories(Array.isArray(data) ? data : []);
                } catch (e) {
                    console.error("Failed to fetch memories", e);
                }
                setLoading(false);
            };

            const fetchProjects = async () => {
                try {
                    const res = await fetch(`http://localhost:3000/api/projects`);
                    const data = await res.json();
                    if (Array.isArray(data) && data.length > 0) {
                        setProjects(data);
                        // Only set if current project isn't in the list
                        if (!data.includes(project)) {
                            setProject(data[0]);
                        }
                    }
                } catch (e) {
                    console.error("Failed to fetch projects", e);
                }
            };

            const fetchPersonas = async () => {
                try {
                    const res = await fetch(`http://localhost:3000/api/personas`);
                    const data = await res.json();
                    setPersonas(data);
                } catch (e) {
                    console.error("Failed to fetch personas", e);
                }
            };

            const fetchCurrentPersona = async () => {
                try {
                    const res = await fetch(`http://localhost:3000/api/persona/${project}`);
                    const data = await res.json();
                    if (data.persona) {
                        setActivePersona(data.persona);
                    }
                } catch (e) {
                    console.error("Failed to fetch current persona", e);
                }
            };

            const updatePersona = async (personaId) => {
                setActivePersona(personaId);
                try {
                    await fetch(`http://localhost:3000/api/persona`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ project, persona: personaId })
                    });
                } catch (e) {
                    console.error("Failed to update persona", e);
                }
            };

            const handleSearch = async (e) => {
                if (e.key === 'Enter') {
                    setLoading(true);
                    try {
                        const res = await fetch(`http://localhost:3000/api/search`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ query: searchQuery, project })
                        });
                        const data = await res.json();
                        setMemories(data);
                    } catch (e) {
                        console.error("Search failed", e);
                    }
                    setLoading(false);
                }
            };

            const deleteMemory = async (id) => {
                if (!confirm("Are you sure you want to delete this memory?")) return;
                try {
                    await fetch(`http://localhost:3000/api/memories/${id}`, { method: 'DELETE' });
                    fetchData();
                } catch (e) {
                    console.error("Delete failed", e);
                }
            };

            const [editingMemory, setEditingMemory] = useState(null);

            const updateMemory = async (id, updates) => {
                try {
                    await fetch(`http://localhost:3000/api/memories/${id}`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updates)
                    });
                    setEditingMemory(null);
                    fetchData();
                } catch (e) {
                    console.error("Update failed", e);
                }
            };

            return (
                <div className="min-h-screen p-6 md:p-12 max-w-7xl mx-auto">
                    {/* Header */}
                    <header className="flex flex-col md:flex-row justify-between items-center mb-12 gap-6 pt-4 border-b border-white/5 pb-8">
                        <div className="flex items-center gap-6">
                            <img src="/assets/MemoriaLogo.png" alt="Memoria" className="h-12 w-auto object-contain filter drop-shadow-[0_0_15px_var(--persona-glow)]" />
                        </div>

                        <div className="flex gap-4">
                            <div className="glass px-4 py-2 rounded-none flex items-center gap-2 border cli-border">
                                <span className="text-[10px] uppercase tracking-widest font-bold text-nowrap" style={{ color: 'var(--persona-color)' }}>PROJECT_ID:</span>
                                <select
                                    className="bg-transparent border-none outline-none text-white font-mono text-sm cursor-pointer uppercase"
                                    value={project}
                                    onChange={(e) => setProject(e.target.value)}
                                >
                                    {projects.map(p => (
                                        <option key={p} value={p} className="bg-black">{p}</option>
                                    ))}
                                </select>
                            </div>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                        {/* Sidebar / Personas */}
                        <div className="space-y-6">
                            <div className="glass p-6 rounded-none border cli-border">
                                <div className="flex items-center gap-2 mb-6 border-b border-white/5 pb-2">
                                    <i data-lucide="terminal" className="w-4 h-4" style={{ color: 'var(--persona-color)' }}></i>
                                    <h2 className="font-bold text-sm uppercase tracking-widest text-white">Personas</h2>
                                </div>
                                <div className="space-y-2">
                                    {personas.map((p) => (
                                        <button
                                            key={p.id}
                                            onClick={() => updatePersona(p.id)}
                                            className={`w-full text-left px-3 py-2 transition-all duration-300 border ${activePersona === p.id
                                                ? 'bg-white/5 text-white glow-persona'
                                                : 'border-transparent hover:border-white/10 opacity-60 grayscale'
                                                }`}
                                            style={activePersona === p.id ? { borderColor: 'var(--persona-color)' } : {}}
                                        >
                                            <div className="font-bold text-[10px] uppercase">{p.name}</div>
                                            <div className="text-[8px] opacity-60 truncate">{p.directive}</div>
                                        </button>
                                    ))}
                                </div>
                            </div>

                            <div className="glass p-6 rounded-none border border-white/5">
                                <div className="flex items-center gap-2 mb-4 uppercase italic" style={{ color: 'var(--persona-color)' }}>
                                    <i data-lucide="cpu" className="w-4 h-4"></i>
                                    <h3 className="font-bold text-[10px]">Sys_Stat</h3>
                                </div>
                                <div className="space-y-1 text-[10px] font-mono">
                                    <div className="flex justify-between">
                                        <span className="opacity-60">MCP:</span>
                                        <span style={{ color: 'var(--persona-color)' }}>ONLINE</span>
                                    </div>
                                    <div className="flex justify-between">
                                        <span className="opacity-60">DB:</span>
                                        <span className="text-white">SQL_WAL</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Main Feed */}
                        <div className="lg:col-span-3 space-y-8">
                            {/* Search */}
                            <div className="relative group">
                                <div className="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                                    <span style={{ color: 'var(--persona-color)' }} className="font-bold">{'>'}</span>
                                </div>
                                <input
                                    type="text"
                                    className="w-full bg-black/50 border border-white/5 rounded-none py-4 pl-10 pr-4 outline-none focus:border-white transition-all text-lg font-mono tracking-tighter text-white"
                                    placeholder="QUERY_CORE_MEMORY..."
                                    value={searchQuery}
                                    onChange={(e) => setSearchQuery(e.target.value)}
                                    onKeyDown={handleSearch}
                                />
                                <div className="absolute right-4 inset-y-0 flex items-center">
                                    <span className="text-[8px] opacity-50 border border-white/10 px-2 py-1">[EXE_ON_ENTER]</span>
                                </div>
                            </div>

                            {/* Feed */}
                            <div className="space-y-6">
                                {loading ? (
                                    <div className="flex flex-col items-center justify-center py-24 gap-4 opacity-70">
                                        <div className="w-12 h-12 border-2 border-t-transparent rounded-none animate-spin" style={{ borderColor: 'var(--persona-color)', borderTopColor: 'transparent' }}></div>
                                        <p className="text-xs tracking-[0.3em] uppercase">Retrieving_Data_Packets...</p>
                                    </div>
                                ) : memories.length === 0 ? (
                                    <div className="glass p-12 rounded-none border border-white/5 text-center">
                                        <h3 className="text-xl font-bold mb-2 uppercase tracking-tighter">No_Data_Found</h3>
                                        <p className="opacity-60 text-xs">Sector "{project}" is empty. No observations logged.</p>
                                    </div>
                                ) : (
                                    memories.map((m) => (
                                        <div key={m.id} className="glass p-6 rounded-none border border-white/5 hover:border-white/20 transition-all duration-300 group cli-border">
                                            <div className="flex justify-between items-start mb-6 border-b border-white/5 pb-4">
                                                <div className="flex items-center gap-4">
                                                    <span className={`px-2 py-0.5 text-[9px] font-bold uppercase ${m.type === 'bug' ? 'bg-red-900/20 text-red-500' :
                                                        m.type === 'decision' ? 'bg-blue-900/20 text-blue-500' :
                                                            m.type === 'architecture' ? 'bg-purple-900/20 text-purple-500' :
                                                                'bg-white/5 text-white opacity-60'
                                                        }`}>
                                                        {m.type}
                                                    </span>
                                                    <h3 className="font-bold text-md text-white uppercase tracking-tight group-hover:text-white transition-colors" style={activePersona === 'neutral' ? { color: 'var(--persona-color)' } : {}}>{m.title}</h3>
                                                </div>
                                                <div className="flex items-center gap-6">
                                                    <div className="text-[9px] opacity-50 uppercase font-mono">
                                                        [{m.timestamp ? new Date(m.timestamp).toISOString() : 'NULL_TS'}]
                                                    </div>
                                                    <div className="flex items-center gap-2">
                                                        <button
                                                            onClick={() => setEditingMemory(m)}
                                                            className="flex items-center gap-1 px-2 py-1 border border-white/10 hover:border-white/40 hover:bg-white/5 transition-all text-[9px] uppercase font-bold text-white"
                                                        >
                                                            <i data-lucide="edit-3" className="w-3 h-3"></i>
                                                            <span>Edit</span>
                                                        </button>
                                                        <button
                                                            onClick={() => deleteMemory(m.id)}
                                                            className="flex items-center gap-1 px-2 py-1 border border-red-900/50 hover:border-red-500 hover:bg-red-900/20 transition-all text-[9px] uppercase font-bold text-red-500"
                                                        >
                                                            <i data-lucide="x-square" className="w-3 h-3"></i>
                                                            <span>Delete</span>
                                                        </button>
                                                    </div>
                                                </div>
                                            </div>
                                            <p className="opacity-80 text-xs leading-relaxed whitespace-pre-wrap font-mono text-white">
                                                {m.content}
                                            </p>
                                            {m.score !== undefined && (
                                                <div className="mt-6 pt-4 border-t border-white/5 flex items-center justify-between">
                                                    <div className="flex items-center gap-4">
                                                        <div className="w-48 h-0.5 bg-white/5 rounded-none overflow-hidden">
                                                            <div className="h-full" style={{ width: `${Math.min(100, m.score * 100)}%`, backgroundColor: 'var(--persona-color)' }}></div>
                                                        </div>
                                                        <span className="text-[8px] font-mono opacity-60">REL_SCORE: {(m.score * 100).toFixed(2)}%</span>
                                                    </div>
                                                    <button className="text-[8px] opacity-60 hover:opacity-100 transition-colors uppercase tracking-[0.2em] font-bold">
                                                        [EXPAND_RECORD]
                                                    </button>
                                                </div>
                                            )}
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    {/* Edit Modal */}
                    {editingMemory && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/95 backdrop-blur-sm">
                            <div className="glass w-full max-w-2xl rounded-none p-8 space-y-6 border cli-border" style={{ borderColor: 'var(--persona-color)' }}>
                                <h2 className="text-2xl font-bold uppercase text-white tracking-tighter">Edit_Record</h2>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-widest mb-2 font-bold font-mono" style={{ color: 'var(--persona-color)' }}>Field_Title</label>
                                        <input
                                            type="text"
                                            className="w-full bg-black border border-white/10 rounded-none px-4 py-3 outline-none focus:border-white font-mono text-white"
                                            value={editingMemory.title}
                                            onChange={(e) => setEditingMemory({ ...editingMemory, title: e.target.value })}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-[10px] uppercase tracking-widest mb-2 font-bold font-mono" style={{ color: 'var(--persona-color)' }}>Field_Content</label>
                                        <textarea
                                            className="w-full bg-black border border-white/10 rounded-none px-4 py-3 outline-none focus:border-white h-48 resize-none font-mono text-xs text-white"
                                            value={editingMemory.content}
                                            onChange={(e) => setEditingMemory({ ...editingMemory, content: e.target.value })}
                                        ></textarea>
                                    </div>
                                </div>
                                <div className="flex justify-end gap-4">
                                    <button
                                        onClick={() => setEditingMemory(null)}
                                        className="px-6 py-2 rounded-none hover:bg-white/5 transition-colors uppercase text-[10px] font-bold"
                                        style={{ color: 'var(--persona-color)' }}
                                    >
                                        [ABORT]
                                    </button>
                                    <button
                                        onClick={() => updateMemory(editingMemory.id, { title: editingMemory.title, content: editingMemory.content })}
                                        className="px-8 py-2 text-black rounded-none font-bold uppercase text-[10px] transition-colors"
                                        style={{ backgroundColor: 'var(--persona-color)' }}
                                    >
                                        [COMMIT_CHANGES]
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Refresh icons
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>

</html>
